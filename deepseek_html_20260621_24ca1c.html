<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - TrustHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center text-white text-3xl mx-auto mb-4">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-sm text-slate-500 mt-1">Sign in to manage your trust profile</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="loginEmail" value="admin@trusthub.com" class="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" required />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" value="password123" class="w-full border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" required />
                </div>
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-slate-600">
                        <input type="checkbox" checked class="rounded border-slate-300" /> Remember me
                    </label>
                    <a href="#" class="text-indigo-600 hover:text-indigo-800 transition">Forgot password?</a>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg transition font-medium text-sm">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500">Don't have an account? <a href="register.html" class="text-indigo-600 hover:text-indigo-800 font-medium">Sign up</a></p>
            </div>
            
            <div class="mt-6 pt-6 border-t border-slate-200">
                <p class="text-xs text-slate-400 text-center">
                    <i class="fas fa-shield-halved text-indigo-400 mr-1"></i>
                    Demo: admin@trusthub.com / password123
                </p>
                <div class="mt-2 flex justify-center gap-2 text-xs">
                    <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded">Admin</span>
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">Citizen</span>
                    <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded">Bank</span>
                    <span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded">Police</span>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (email.includes('admin')) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'citizen-dashboard.html';
            }
        });
    </script>
</body>
</html>
